name: Deploy Waterguard site to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Verify site directory exists
        run: |
          if [ ! -d "./waterguard_site" ]; then
            echo "Error: ./waterguard_site does not exist"
            exit 1
          fi
          echo "Site directory found:"
          ls -la ./waterguard_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./waterguard_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
